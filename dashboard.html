<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>lomeXpress — Admin</title>
  <link rel="icon" type="image/png" href="uploads/LG4.jpeg"/>
  <link rel="apple-touch-icon" href="uploads/LG4.jpeg"/>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">

  <style>
    /* ═══════════════════════════════════════════════════════
       DESIGN SYSTEM (Style Original Conservé)
    ═══════════════════════════════════════════════════════ */
    :root {
      --bg: #0b0f1a;
      --surface: rgba(23, 28, 41, 0.8);
      --border: rgba(255, 255, 255, 0.08);
      --accent: #3b82f6;
      --accent-glow: rgba(59, 130, 246, 0.3);
      --ink: #ffffff;
      --ink-muted: #94a3b8;
      --danger: #ef4444;
      --r-lg: 20px;
      --r-md: 12px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--ink); overflow-x: hidden; min-height: 100vh; }

    .bg-glow {
      position: fixed; top: -10%; left: -10%; width: 40%; height: 40%;
      background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
      filter: blur(80px); z-index: -1; animation: float 10s infinite alternate;
    }
    @keyframes float { from { transform: translate(0,0); } to { transform: translate(20%, 20%); } }

    /* ══ LOGIN ═══════════════════════ */
    .login-screen { position: fixed; inset: 0; z-index: 1000; display: flex; align-items: center; justify-content: center; background: var(--bg); padding: 20px; }
    .login-card { background: var(--surface); backdrop-filter: blur(20px); border: 1px solid var(--border); padding: 3rem 2.5rem; border-radius: var(--r-lg); width: 100%; max-width: 420px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.4); animation: reveal 0.6s cubic-bezier(0.2, 0.8, 0.2, 1); }
    @keyframes reveal { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    /* ══ LAYOUT ══════════════════════════════════ */
    .dash-container { display: none; padding-top: 80px; }
    header { position: fixed; top: 0; width: 100%; height: 70px; background: rgba(11, 15, 26, 0.7); backdrop-filter: blur(15px); border-bottom: 1px solid var(--border); z-index: 500; display: flex; align-items: center; }
    .header-content { width: 100%; max-width: 1200px; margin: 0 auto; padding: 0 24px; display: flex; justify-content: space-between; align-items: center; }
    .brand { font-weight: 800; font-size: 1.2rem; }
    .brand span { color: var(--accent); }

    .dash-nav { display: flex; gap: 8px; background: rgba(255,255,255,0.03); padding: 5px; border-radius: 12px; }
    .nav-btn { padding: 8px 16px; border: none; background: none; color: var(--ink-muted); font-weight: 600; font-size: 0.85rem; cursor: pointer; border-radius: 8px; transition: 0.3s; }
    .nav-btn.active { background: var(--accent); color: white; box-shadow: 0 4px 12px var(--accent-glow); }

    .main-grid { max-width: 1200px; margin: 0 auto; padding: 24px; }

    /* KPI Cards */
    .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-bottom: 32px; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); padding: 24px; border-radius: var(--r-md); }
    .stat-card h4 { font-size: 0.75rem; color: var(--ink-muted); text-transform: uppercase; letter-spacing: 1px; }
    .stat-card .val { font-size: 2.2rem; font-weight: 800; margin-top: 8px; }

    /* Tables & Cards */
    .glass-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-lg); padding: 24px; margin-bottom: 24px; animation: reveal 0.8s ease; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    .img-preview-sm { width: 45px; height: 45px; border-radius: 8px; object-fit: cover; background: #000; border: 1px solid var(--border); }
    table { width: 100%; border-collapse: collapse; margin-top: 16px; }
    th { text-align: left; padding: 12px; color: var(--ink-muted); font-size: 0.75rem; text-transform: uppercase; border-bottom: 1px solid var(--border); }
    td { padding: 12px; border-bottom: 1px solid var(--border); font-size: 0.9rem; vertical-align: middle; }

    .form-group { margin-bottom: 20px; }
    .form-label { display: block; margin-bottom: 8px; font-size: 0.85rem; color: var(--ink-muted); }
    .form-input, .form-select, .form-textarea { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border); padding: 12px; border-radius: 10px; color: white; font-family: inherit; }

    .btn-submit { width: 100%; padding: 14px; background: var(--accent); color: white; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.3s; }
    .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 8px 20px var(--accent-glow); }

    /* Modal Suppression */
    .modal { position: fixed; inset: 0; z-index: 2000; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); display: none; align-items: center; justify-content: center; padding: 20px; }
    .modal-card { background: var(--surface); border: 1px solid var(--border); padding: 2.5rem; border-radius: var(--r-lg); max-width: 400px; width: 100%; text-align: center; }

    .toast { position: fixed; bottom: 30px; right: 30px; background: white; color: black; padding: 16px 24px; border-radius: 12px; font-weight: 700; transform: translateY(150%); transition: 0.4s; z-index: 3000; }
    .toast.show { transform: translateY(0); }

    .qty-badge { background: #1e293b; padding: 4px 10px; border-radius: 20px; border: 1px solid var(--border); font-weight: 800; }
    .btn-action { background: none; border: 1px solid var(--border); color: white; padding: 6px 10px; border-radius: 6px; cursor: pointer; }
  </style>
</head>
<body>

  <div class="bg-glow"></div>

  <div id="login-screen" class="login-screen">
    <div class="login-card">
      <div style="font-size: 3rem; margin-bottom: 1rem;">💎</div>
      <h2>Accès Privé</h2>
      <p style="color: var(--ink-muted); margin-bottom: 2rem;">Entrez votre code vendeur.</p>
      <input type="password" id="login-code" class="form-input" placeholder="••••••••" style="text-align:center; margin-bottom:20px;">
      <button class="btn-submit" onclick="doLogin()">Déverrouiller</button>
    </div>
  </div>

  <div id="dashboard-ui" class="dash-container">
    <header>
      <div class="header-content">
        <div class="brand">LOME<span>XPRESS</span></div>
        <nav class="dash-nav">
          <button class="nav-btn active" onclick="switchTab('overview', this)">📊 Stats</button>
          <button class="nav-btn" onclick="switchTab('inventory', this)">📦 Stock</button>
          <button class="nav-btn" onclick="switchTab('publish', this)">➕ Ajouter</button>
          <button class="nav-btn" onclick="switchTab('config', this)">⚙️ Config</button>
        </nav>
        <button onclick="doLogout()" style="background:none; border:none; color:var(--accent); font-weight:700; cursor:pointer;">Quitter</button>
      </div>
    </header>

    <main class="main-grid">
      <section id="tab-overview" class="tab-content active">
        <div class="stats-row">
          <div class="stat-card"><h4>Produits</h4><div class="val" id="stat-total">0</div></div>
          <div class="stat-card"><h4>Rupture</h4><div class="val" id="stat-out" style="color:var(--danger)">0</div></div>
          <div class="stat-card"><h4>Stock Faible</h4><div class="val" id="stat-low" style="color:#f59e0b">0</div></div>
        </div>
        <div class="glass-card">
          <h3>Dernière Activité</h3>
          <p id="last-log" style="color:var(--ink-muted); margin-top:15px;">Dashboard prêt pour la gestion.</p>
        </div>
      </section>

      <section id="tab-inventory" class="tab-content">
        <div class="glass-card">
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h3>Inventaire</h3>
            <input type="text" placeholder="Chercher..." id="search-input" class="form-input" style="width:200px;" oninput="filterTable()">
          </div>
          <div style="overflow-x:auto;">
            <table>
              <thead>
                <tr><th>Image</th><th>Nom</th><th>Prix</th><th>Stock</th><th>Actions</th></tr>
              </thead>
              <tbody id="inventory-body"></tbody>
            </table>
          </div>
        </div>
      </section>

      <section id="tab-publish" class="tab-content">
        <div class="glass-card" style="max-width: 700px; margin: 0 auto;">
          <h3 id="form-title">Ajouter au catalogue</h3>
          <form id="product-form" onsubmit="handleSave(event)" style="margin-top:20px;">
            <input type="hidden" id="edit-id">
            <div class="form-group"><label class="form-label">Nom</label><input type="text" id="pub-name" class="form-input" required></div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
              <div class="form-group"><label class="form-label">Prix (F)</label><input type="number" id="pub-price" class="form-input" required></div>
              <div class="form-group"><label class="form-label">Quantité</label><input type="number" id="pub-qty" class="form-input" required></div>
            </div>
            <div class="form-group">
              <label class="form-label">Catégorie</label>
              <select id="pub-cat" class="form-select">
                <option value="solar">☀️ Solaire</option><option value="home">🏠 Maison</option>
                <option value="car">🚗 Auto</option><option value="fashion">👗 Mode</option>
                <option value="connected">📡 Connecté</option>
              </select>
            </div>
            <div class="form-group"><label class="form-label">Description</label><textarea id="pub-desc" class="form-textarea" rows="3"></textarea></div>
            <div class="form-group"><label class="form-label">Médias</label><input type="file" id="pub-files" class="form-input" multiple accept="image/*"></div>
            <button type="submit" class="btn-submit" id="save-btn">Enregistrer</button>
          </form>
        </div>
      </section>

      <section id="tab-config" class="tab-content">
        <div class="glass-card" style="max-width: 450px; margin: 0 auto; text-align: center;">
          <div style="font-size: 2.5rem; margin-bottom: 1rem;">⚙️</div>
          <h3>Sécurité</h3>
          <p style="color: var(--ink-muted); margin-bottom: 2rem;">Changer votre code d'accès.</p>
          <input type="text" id="new-seller-code" class="form-input" placeholder="Nouveau code" style="margin-bottom:20px;">
          <button class="btn-submit" onclick="updateAccessCode()">Mettre à jour</button>
        </div>
      </section>
    </main>
  </div>

  <div id="del-modal" class="modal">
    <div class="modal-card">
      <div style="font-size: 3rem; margin-bottom: 1rem;">⚠️</div>
      <h3>Confirmer la suppression ?</h3>
      <div style="display:flex; gap:10px; margin-top: 2rem;">
        <button class="btn-submit" style="background:rgba(255,255,255,0.1);" onclick="closeDelModal()">Annuler</button>
        <button class="btn-submit" style="background:var(--danger);" id="confirm-del-btn">Supprimer</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"><span id="toast-msg"></span></div>

  <script>
    const API = 'api.php';
    let SELLER_CODE = localStorage.getItem('LX_SELLER_CODE') || 'HOSTINGER2026';
    const SESSION_KEY = 'lx_session_auth';
    let products = [];
    let idToDelete = null;

    function doLogin() {
      if(document.getElementById('login-code').value === SELLER_CODE) {
        sessionStorage.setItem(SESSION_KEY, 'true');
        initDash();
      } else { showToast('Code erroné ❌'); }
    }
    function doLogout() { sessionStorage.removeItem(SESSION_KEY); location.reload(); }

    function initDash() {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('dashboard-ui').style.display = 'block';
      loadProducts();
    }

    function switchTab(id, btn) {
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('tab-' + id).classList.add('active');
      btn.classList.add('active');
    }

    function updateAccessCode() {
      const val = document.getElementById('new-seller-code').value.trim();
      if(val.length < 4) return showToast('Code trop court !');
      localStorage.setItem('LX_SELLER_CODE', val);
      SELLER_CODE = val;
      showToast('Code mis à jour ! ✅');
    }

    async function loadProducts() {
      try {
        const res = await fetch(`${API}?action=list`);
        const data = await res.json();
        if(data.ok) { products = data.products; renderAll(); }
      } catch(e) { showToast('Erreur API'); }
    }

    function renderAll() {
      // Maj Stats
      document.getElementById('stat-total').textContent = products.length;
      document.getElementById('stat-out').textContent = products.filter(p => p.qty <= 0).length;
      document.getElementById('stat-low').textContent = products.filter(p => p.qty > 0 && p.qty <= 5).length;

      // Maj Tableau
      const body = document.getElementById('inventory-body');
      body.innerHTML = products.slice().reverse().map(p => {
        let imgSrc = (p.media && p.media.length > 0) ? p.media[0].src : 'https://placehold.co/100x100/111/white?text=No+Img';
        return `
          <tr>
            <td><img src="${imgSrc}" class="img-preview-sm" onerror="this.src='https://placehold.co/100x100/111/white?text=Error'"></td>
            <td><strong>${p.name}</strong><br><small style="color:var(--ink-muted)">${p.category}</small></td>
            <td>${p.price.toLocaleString()} F</td>
            <td><span class="qty-badge">${p.qty}</span></td>
            <td>
              <button class="btn-action" onclick="editProduct('${p.id}')">✏️</button>
              <button class="btn-action" onclick="openDelModal('${p.id}')" style="color:var(--danger)">🗑️</button>
            </td>
          </tr>
        `;
      }).join('');
    }

    async function handleSave(e) {
      e.preventDefault();
      const btn = document.getElementById('save-btn');
      btn.disabled = true; btn.textContent = 'Envoi...';

      const fd = new FormData();
      fd.append('action', 'save');
      fd.append('code', SELLER_CODE);
      fd.append('id', document.getElementById('edit-id').value);
      fd.append('name', document.getElementById('pub-name').value);
      fd.append('price', document.getElementById('pub-price').value);
      fd.append('qty', document.getElementById('pub-qty').value);
      fd.append('category', document.getElementById('pub-cat').value);
      fd.append('desc', document.getElementById('pub-desc').value);

      const files = document.getElementById('pub-files').files;
      for(let i=0; i<files.length; i++) fd.append('images[]', files[i]);

      const res = await fetch(API, { method: 'POST', body: fd });
      const data = await res.json();
      if(data.ok) {
        showToast('Enregistré ! ✨');
        resetForm(); loadProducts();
        switchTab('overview', document.querySelector('.nav-btn'));
      }
      btn.disabled = false; btn.textContent = 'Enregistrer';
    }

    function openDelModal(id) { idToDelete = id; document.getElementById('del-modal').style.display = 'flex'; }
    function closeDelModal() { document.getElementById('del-modal').style.display = 'none'; }
    document.getElementById('confirm-del-btn').onclick = async () => {
      const fd = new FormData();
      fd.append('action', 'delete'); fd.append('code', SELLER_CODE); fd.append('id', idToDelete);
      await fetch(API, { method:'POST', body:fd });
      closeDelModal(); loadProducts(); showToast('Supprimé');
    };

    function editProduct(id) {
      const p = products.find(x => x.id === id);
      document.getElementById('edit-id').value = p.id;
      document.getElementById('pub-name').value = p.name;
      document.getElementById('pub-price').value = p.price;
      document.getElementById('pub-qty').value = p.qty;
      document.getElementById('pub-desc').value = p.desc;
      document.getElementById('pub-cat').value = p.category;
      document.getElementById('form-title').textContent = 'Modifier : ' + p.name;
      switchTab('publish', document.querySelectorAll('.nav-btn')[2]);
    }

    function resetForm() { document.getElementById('product-form').reset(); document.getElementById('edit-id').value = ''; document.getElementById('form-title').textContent = 'Ajouter au catalogue'; }
    function showToast(m) { const t = document.getElementById('toast'); document.getElementById('toast-msg').textContent = m; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000); }
    function filterTable() { const val = document.getElementById('search-input').value.toLowerCase(); document.querySelectorAll('#inventory-body tr').forEach(r => r.style.display = r.innerText.toLowerCase().includes(val) ? '' : 'none'); }

    if(sessionStorage.getItem(SESSION_KEY)) initDash();
  </script>
</body>
</html>
